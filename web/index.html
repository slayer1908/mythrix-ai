  <!-- Loading screen: matches the dark "cosmic" aesthetic of the app so the
       transition from page-load to Flutter splash feels seamless. -->
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #06070C; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      color: #F5F7FA;
      overflow: hidden;
    }
    #boot {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 24px;
      background: radial-gradient(circle at 30% 20%, rgba(124,92,255,.25), transparent 50%),
                  radial-gradient(circle at 70% 80%, rgba(34,211,238,.20), transparent 50%),
                  #06070C;
      transition: opacity 400ms ease-out;
    }
    #boot.fade { opacity: 0; pointer-events: none; }
    #boot .mark {
      font-weight: 800;
      font-size: 36px;
      letter-spacing: 4px;
      background: linear-gradient(135deg, #7C5CFF, #22D3EE);
      -webkit-background-clip: text; background-clip: text;
      color: transparent;
    }
    #boot .progress {
      width: 180px; height: 2px;
      background: rgba(255,255,255,.1);
      border-radius: 2px; overflow: hidden;
    }
    #boot .progress span {
      display: block; height: 100%;
      width: 40%;
      background: linear-gradient(90deg, #7C5CFF, #22D3EE);
      animation: slide 1.2s infinite ease-in-out;
    }
    #boot .tag {
      font-size: 11px; opacity: .6; letter-spacing: 2px; text-transform: uppercase;
    }
    @keyframes slide {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }
  </style>
</head>
<body>
  <div id="boot">
    <div class="mark">MYTHRIX<span style="color:#22D3EE">.AI</span></div>
    <div class="progress"><span></span></div>
    <div class="tag">Calibrating your growth engine…</div>
  </div>

  <script>
    // Fade out the boot screen when Flutter has rendered its first frame.
    function removeBoot() {
      var el = document.getElementById('boot');
      if (!el) return;
      el.classList.add('fade');
      setTimeout(function () { if (el && el.parentNode) el.remove(); }, 500);
    }
    window.addEventListener('flutter-first-frame', removeBoot);

    // Safety net: if Flutter hasn't booted within 8s (network slow, JS error,
    // service worker stuck), force-fade the loader so the user at least sees
    // SOMETHING — either Flutter or a blank canvas + console errors to debug.
    setTimeout(function () {
      var el = document.getElementById('boot');
      if (el) {
        var tag = el.querySelector('.tag');
        if (tag) tag.textContent = 'Taking longer than expected — retrying…';
      }
    }, 8000);
    setTimeout(removeBoot, 12000);

    // Aggressively kill any stale service workers that were cached from a
    // previous deploy. Solves "splash stuck forever" on re-deploys.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        for (var i = 0; i < regs.length; i++) {
          // Unregister, but don't await — we still want Flutter to load now.
          regs[i].unregister().catch(function () {});
        }
      }).catch(function () {});
    }

    // Log JS errors visibly during the boot phase so we can spot the cause
    // when the user shares a screenshot.
    window.addEventListener('error', function (e) {
      var el = document.getElementById('boot');
      if (el) {
        var tag = el.querySelector('.tag');
        if (tag) tag.textContent = 'BOOT ERROR: ' + (e.message || 'unknown');
      }
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>

  <!-- Vercel Web Analytics -->

    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
