name: mythrix_ai
description: "MYTHRIX.AI — Fully autonomous AI for digital marketing. Content, creatives, ads, social, analytics — all on autopilot."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ===== State management =====
  flutter_riverpod: ^2.6.1
  # riverpod_annotation: ^2.6.1  # re-enable when adopting @riverpod codegen

  # ===== Routing =====
  go_router: ^14.6.2

  # ===== UI / Design system =====
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.16
  cached_network_image: ^3.4.1
  lottie: ^3.3.1
  animations: ^2.0.11
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2
  font_awesome_flutter: ^11.0.0

  # ===== Charts & data viz =====
  fl_chart: ^0.69.2
  syncfusion_flutter_charts: ^28.1.39
  syncfusion_flutter_gauges: ^28.1.39

  # ===== Calendar / scheduling =====
  table_calendar: ^3.1.3
  syncfusion_flutter_calendar: ^28.1.39

  # ===== Networking & data =====
  dio: ^5.7.0
  http: ^1.2.2
  # json_annotation: ^4.9.0     # re-enable when adopting json_serializable
  # freezed_annotation: ^2.4.4  # re-enable when adopting freezed codegen

  # ===== Storage & security =====
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  local_auth: ^2.3.0
  crypto: ^3.0.6
  encrypt: ^5.0.3

  # ===== Firebase =====
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0
  firebase_analytics: ^11.3.5
  firebase_crashlytics: ^4.1.5
  firebase_messaging: ^15.1.5
  firebase_storage: ^12.3.5
  firebase_remote_config: ^5.1.5

  # ===== Auth providers =====
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.3

  # ===== Notifications =====
  flutter_local_notifications: ^18.0.1
  timezone: 0.10.0

  # ===== Billing =====
  flutter_stripe: ^11.1.0

  # ===== AI client packages =====
  # Anthropic API is wired via Dio (no official SDK).
  # OpenAI via a maintained community package.
  openai_dart: ^0.4.5

  # ===== Utilities =====
  intl: ^0.20.2
  uuid: ^4.5.1
  collection: ^1.18.0
  rxdart: ^0.28.0
  url_launcher: ^6.3.1
  share_plus: ^10.1.2
  path_provider: ^2.1.5
  image_picker: ^1.1.2
  file_picker: ^8.1.4
  permission_handler: ^11.3.1
  device_info_plus: ^11.1.1
  package_info_plus: ^8.1.1
  connectivity_plus: ^6.1.0

  # ===== Desktop window management =====
  window_manager: ^0.4.3

  # ===== Editor / rich text =====
  # flutter_quill 10.x pins intl ^0.19, which conflicts with Flutter SDK's
  # pinned 0.20.2. Re-enable once v11 stable lands.
  # flutter_quill: ^11.0.0

  # ===== Markdown =====
  flutter_markdown: ^0.7.4+3

  # ===== Logging & error tracking =====
  logger: ^2.5.0
  sentry_flutter: ^8.11.0

  # ===== Environment =====
  flutter_dotenv: ^5.2.1

  # ===== Helpers =====
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4

  # Code generation — disabled until we adopt annotated classes.
  # hive_generator + riverpod_generator pull conflicting analyzer versions
  # in May 2026; re-enable selectively once we actually need codegen.
  # build_runner: ^2.4.13
  # freezed: ^2.5.7
  # json_serializable: ^6.8.0
  # hive_generator: ^2.0.1
  # riverpod_generator: ^2.6.3
  # riverpod_lint: ^2.6.3
  # custom_lint: ^0.7.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
    - .env
