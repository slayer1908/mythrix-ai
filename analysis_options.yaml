include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "build/**"
    - "lib/generated/**"
  errors:
    invalid_annotation_target: ignore
    # Flutter 3.27 deprecated withOpacity in favor of withValues(alpha:).
    # Tracked for a future bulk cleanup; not a runtime issue.
    deprecated_member_use: info
    # Auto-suggestions only — don't fail CI for these.
    inference_failure_on_instance_creation: info
    require_trailing_commas: info
    use_build_context_synchronously: info
    unused_import: warning

linter:
  rules:
    # Keep critical correctness lints on as warnings, not errors.
    avoid_print: true
    use_key_in_widget_constructors: true
    prefer_final_locals: false
    prefer_const_constructors: false
    prefer_const_literals_to_create_immutables: false
    sort_child_properties_last: false
    require_trailing_commas: false
